name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Mac Catalyst app
        run: |
          xcodebuild \
            -project HomeBridgeOrganizer/HomeBridgeOrganizer.xcodeproj \
            -scheme HomeBridgeOrganizer \
            -configuration Debug \
            -destination 'platform=macOS,variant=Mac Catalyst' \
            CODE_SIGNING_ALLOWED=NO \
            build
      - name: Check Ruby exporter syntax
        run: ruby -c scripts/export_homekit_room_map.rb
      - name: Check plist files
        run: |
          plutil -lint HomeBridgeOrganizer/HomeBridgeOrganizer/Info.plist
          plutil -lint HomeBridgeOrganizer/HomeBridgeOrganizer/HomeBridgeOrganizer.entitlements
